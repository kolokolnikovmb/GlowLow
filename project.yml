name: GlowLow
options:
  deploymentTarget:
    iOS: 17.0
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.playground.GlowLow
    SWIFT_VERSION: 5.9
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0
targets:
  GlowLow:
    type: application
    platform: iOS
    sources:
      - path: GlowLowApp
        excludes:
          - Resources/Assets.xcassets/**/*.png
    resources:
      - path: GlowLowApp/Resources
    settings:
      base:
        INFOPLIST_FILE: GlowLowApp/Resources/Info.plist
        PRODUCT_NAME: GlowLow
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: 1
